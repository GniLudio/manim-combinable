name: "Build"

on:
  push:

jobs:
  run:
    runs-on: manimcommunity/manim:latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6
      - name: Install uv
        uses: astral-sh/setup-uv@08807647e7069bb48b6ef5acd8ec9567f424441b # v8.1.0
      - name: Install Python 3.11
        run: uv python install 3.11
      - name: Build
        run: uv build
